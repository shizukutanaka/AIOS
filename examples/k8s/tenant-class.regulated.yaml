# Regulated tenant: signed models only, no internet, detailed audit
apiVersion: v1
kind: Namespace
metadata:
  name: regulated
  labels:
    aios.tenant-class: regulated
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: regulated-quota
  namespace: regulated
spec:
  hard:
    requests.nvidia.com/gpu: "2"
    requests.memory: 64Gi
    limits.memory: 128Gi
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: deny-egress
  namespace: regulated
spec:
  podSelector: {}
  policyTypes: [Egress]
  egress:
    - to:
      - namespaceSelector:
          matchLabels:
            aios.tenant-class: regulated
    - to:
      - namespaceSelector:
          matchLabels:
            kubernetes.io/metadata.name: kube-system
      ports:
        - port: 53
          protocol: UDP
